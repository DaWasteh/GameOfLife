<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Conway's Game of Life – Adaptive Canvas Pro</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--panel2:#1f2937;--text:#e5e7eb;--muted:#9ca3af;--accent:#38bdf8;--alive:#f8fafc;--dead:#020617}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
#app{height:100vh;display:grid;grid-template-rows:auto 1fr}.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border-bottom:1px solid #334155;padding:10px 12px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:2}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.title{display:flex;flex-direction:column;gap:2px}.title h1{font-size:18px;line-height:1.1;margin:0}.title span{font-size:12px;color:var(--muted)}.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}button,select,input{font:inherit}button,select{background:#0b1220;color:var(--text);border:1px solid #475569;border-radius:8px;padding:6px 9px;cursor:pointer}button:hover,select:hover{border-color:var(--accent)}button.primary{background:#0284c7;border-color:#38bdf8;color:white}button.danger:hover{border-color:#ef4444;color:#fecaca}label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap}.stats{margin-top:8px;display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted)}.stats strong{color:var(--text)}#canvasWrap{position:relative;overflow:hidden;background:var(--dead);display:flex;align-items:center;justify-content:center}canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair;flex:0 0 auto}.hint{position:absolute;right:10px;bottom:8px;background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.35);border-radius:8px;padding:5px 7px;font-size:11px;color:#cbd5e1;pointer-events:none}.fullscreen .panel{padding:7px 10px}.fullscreen .title span{display:none}@media(max-width:1050px){.top{align-items:flex-start}.controls{gap:6px}.title h1{font-size:16px}}
</style>
</head>
<body>
<div id="app">
  <section class="panel" id="panel">
    <div class="top">
      <div class="title">
        <h1>Conway’s Game of Life · Adaptive Canvas Pro</h1>
        <span>Cell-Ratio: 1=1px/Zelle · 2=2×2px/Zelle · 3=4×4px/Zelle · Zoom ist nur Anzeige</span>
      </div>
      <div class="controls">
        <button id="startStop" class="primary">Start</button>
        <button id="step">Step</button>
        <button id="clear" class="danger">Clear</button>
        <button id="fullscreen">Fullscreen</button>
        <label>FPS <strong id="fpsLabel">30</strong><input id="fps" type="range" min="1" max="120" value="30"></label>
        <label>Dichte <strong id="densityLabel">18</strong>%<input id="density" type="range" min="1" max="80" value="18"></label>
        <button id="random">Random</button>
        <select id="preset">
            <option value="glider">Glider</option>
            <option value="lwss">LWSS</option>
            <option value="blinker">Blinker</option>
            <option value="toad">Toad</option>
            <option value="beacon">Beacon</option>
            <option value="pulsar">Pulsar</option>
            <option value="rpentomino">R-Pentomino</option>
            <option value="diehard">Diehard</option>
            <option value="acorn">Acorn</option>
            <option value="gosper">Gosper Gun</option>
        </select>
        <button id="placePreset">Preset</button>
        <label>Ratio <select id="ratio">
            <option value="1">1 = 1 px/Zelle</option>
            <option value="2">2 = 2×2 px/Zelle</option>
            <option value="3" selected>3 = 4×4 px/Zelle</option>
            <option value="4">4 = 8×8 px/Zelle</option>
            <option value="5">5 = 16×16 px/Zelle</option>
        </select></label>
        <label><input id="zoomMode" type="checkbox"> Zoom</label>
        <label>Zoom <strong id="zoomLabel">1</strong>x<input id="zoom" type="range" min="1" max="16" value="1"></label>
        <label><input id="torus" type="checkbox" checked> Torus</label>
        <label><input id="cycleCheck" type="checkbox" checked> Zyklus-Check</label>
        <button id="save">Save</button>
        <button id="load">Load</button>
      </div>
    </div>
    <div class="stats">
      <span>Grid: <strong id="gridSize">-</strong></span>
      <span>Zellen: <strong id="cellCount">-</strong></span>
      <span>Cell-Pixel: <strong id="cellPxInfo">4×4</strong></span>
      <span>Generation: <strong id="generation">0</strong></span>
      <span>Lebend: <strong id="aliveCount">0</strong></span>
      <span>Status: <strong id="status">bereit</strong></span>
    </div>
  </section>
  <div id="canvasWrap">
      <canvas id="life"></canvas>
      <div class="hint">Leertaste Start/Pause · F Fullscreen · R Random · +/- Zoom · Klick/Ziehen zeichnet · S Save · L Load</div>
  </div>
</div>

<script>
(()=>{
  "use strict";
  const ALIVE = 1, DEAD = 0, HISTORY_LIMIT = 2000;
  let cols = 0, rows = 0, grid = new Uint8Array(0), next = new Uint8Array(0),
      generation = 0, running = false, raf = null, last = 0, drawMode = null,
      imageData = null, pixels = null, patternHistory = new Map();

  const $ = id => document.getElementById(id);
  const app = $("app"), canvas = $("life"), ctx = canvas.getContext("2d", { alpha: false }),
      wrap = $("canvasWrap"), startStop = $("startStop"), stepBtn = $("step"),
      clearBtn = $("clear"), fullscreenBtn = $("fullscreen"), randomBtn = $("random"),
      presetSel = $("preset"), placePresetBtn = $("placePreset"), fps = $("fps"),
      fpsLabel = $("fpsLabel"), density = $("density"), densityLabel = $("densityLabel"),
      ratio = $("ratio"), zoomMode = $("zoomMode"), zoom = $("zoom"),
      zoomLabel = $("zoomLabel"), torus = $("torus"), cycleCheck = $("cycleCheck"),
      gridSize = $("gridSize"), cellCount = $("cellCount"), cellPxInfo = $("cellPxInfo"),
      genEl = $("generation"), aliveEl = $("aliveCount"), statusEl = $("status"),
      saveBtn = $("save"), loadBtn = $("load");

  const presets = {
    glider: [[0,1],[1,2],[2,0],[2,1],[2,2]],
    lwss: [[0,1],[0,4],[1,0],[2,0],[2,4],[3,0],[3,1],[3,2],[3,3]],
    blinker: [[0,0],[0,1],[0,2]],
    toad: [[0,1],[0,2],[0,3],[1,0],[1,1],[1,2]],
    beacon: [[0,0],[0,1],[1,0],[1,1],[2,2],[2,3],[3,2],[3,3]],
    pulsar: [[0,2],[0,3],[0,4],[0,8],[0,9],[0,10],[2,0],[2,5],[2,7],[2,12],[3,0],[3,5],[3,7],[3,12],[4,0],[4,5],[4,7],[4,12],[5,2],[5,3],[5,4],[5,8],[5,9],[5,10],[7,2],[7,3],[7,4],[7,8],[7,9],[7,10],[8,0],[8,5],[8,7],[8,12],[9,0],[9,5],[9,7],[9,12],[10,0],[10,5],[10,7],[10,12],[12,2],[12,3],[12,4],[12,8],[12,9],[12,10]],
    rpentomino: [[0,1],[0,2],[1,0],[1,1],[2,1]],
    diehard: [[0,6],[1,0],[1,1],[2,1],[2,5],[2,6],[2,7]],
    acorn: [[0,1],[1,3],[2,0],[2,1],[2,4],[2,5],[2,6]],
    gosper: [[0,24],[1,22],[1,24],[2,12],[2,13],[2,20],[2,21],[2,34],[2,35],[3,11],[3,15],[3,20],[3,21],[3,34],[3,35],[4,0],[4,1],[4,10],[4,16],[4,20],[4,21],[5,0],[5,1],[5,10],[5,14],[5,16],[5,17],[5,22],[5,24],[6,10],[6,16],[6,24],[7,11],[7,15],[8,12],[8,13]]
  };

  function cellSize() { return 2**(Number(ratio.value)-1); }
  function visualCellSize() { return cellSize()*(zoomMode.checked?Number(zoom.value):1); }
  function idx(x,y) { return y*cols+x; }
  
  function syncCanvasCss() {
    const s = visualCellSize();
    canvas.style.width = (cols*s)+"px";
    canvas.style.height = (rows*s)+"px";
    cellPxInfo.textContent = cellSize()+"×"+cellSize()+" px/Zelle";
    zoomLabel.textContent = zoom.value;
  }

  function resize() {
    const wasRunning = running;
    if(wasRunning) stop(false);

    const rect = wrap.getBoundingClientRect();
    const s = cellSize();
    const newCols = Math.max(1, Math.floor(rect.width/s));
    const newRows = Math.max(1, Math.floor(rect.height/s));

    if(newCols === cols && newRows === rows) {
      syncCanvasCss();
      return;
    }

    const old = grid, oldCols = cols, oldRows = rows;
    cols = newCols; rows = newRows;
    canvas.width = cols; canvas.height = rows;
    grid = new Uint8Array(cols*rows);
    next = new Uint8Array(cols*rows);

    const offX = Math.floor((cols-oldCols)/2);
    const offY = Math.floor((rows-oldRows)/2);
    for(let y=0;y<oldRows;y++)
      for(let x=0;x<oldCols;x++) {
        const nx = x+offX, ny = y+offY;
        if(nx>=0 && nx<cols && ny>=0 && ny<rows)
          grid[idx(nx,ny)] = old[y*oldCols+x];
      }

    imageData = ctx.createImageData(cols, rows);
    pixels = imageData.data;
    patternHistory.clear();

    gridSize.textContent = cols+" × "+rows;
    cellCount.textContent = (cols*rows).toLocaleString("de-DE");
    syncCanvasCss();
    render();

    if(wasRunning) start();
  }

  function count(x,y) {
    let n = 0;
    if(torus.checked) {
      for(let dy=-1;dy<=1;dy++)
        for(let dx=-1;dx<=1;dx++) {
          if(!dx && !dy) continue;
          const xx = (x+dx+cols)%cols, yy = (y+dy+rows)%rows;
          n += grid[idx(xx,yy)];
        }
    } else {
      for(let dy=-1;dy<=1;dy++)
        for(let dx=-1;dx<=1;dx++) {
          if(!dx && !dy) continue;
          const xx = x+dx, yy = y+dy;
          if(xx>=0 && xx<cols && yy>=0 && yy<rows)
            n += grid[idx(xx,yy)];
        }
    }
    return n;
  }

  function step() {
    let alive = 0;
    for(let y=0;y<rows;y++)
      for(let x=0;x<cols;x++) {
        const i = idx(x,y), a = grid[i]===ALIVE, n = count(x,y);
        const v = a?(n===2||n===3?ALIVE:DEAD):(n===3?ALIVE:DEAD);
        next[i] = v;
        if(v) alive++;
      }

    [grid, next] = [next, grid];
    generation++;
    render(alive);

    if(cycleCheck.checked) {
        checkCycle();
    } else {
        statusEl.textContent = "läuft";
    }
  }

  function render(knownAlive) {
    let alive = knownAlive ?? 0;
    for(let i=0,p=0;i<grid.length;i++,p+=4) {
      const a = grid[i]===ALIVE;
      if(knownAlive === undefined && a) alive++;
      pixels[p] = a?248:2;
      pixels[p+1] = a?250:6;
      pixels[p+2] = a?252:23;
      pixels[p+3] = 255;
    }
    ctx.putImageData(imageData, 0, 0);
    genEl.textContent = generation.toLocaleString("de-DE");
    aliveEl.textContent = alive.toLocaleString("de-DE");
  }

  function key() {
    let s = "";
    const chunk = 8192;
    for(let i=0;i<grid.length;i+=chunk)
      s += String.fromCharCode(...grid.subarray(i,i+chunk));
    return s;
  }

  function checkCycle() {
    const k = key();
    if(patternHistory.has(k)) {
      const firstSeen = patternHistory.get(k);
      const period = generation - firstSeen;
      statusEl.textContent = `Zyklus! Distanz: ${firstSeen} Gen | Länge: ${period} Gen`;
    } else {
      patternHistory.set(k, generation);
      if(patternHistory.size > HISTORY_LIMIT) {
        const firstKey = patternHistory.keys().next().value;
        patternHistory.delete(firstKey);
      }
      statusEl.textContent = "läuft";
    }
  }

  function start() {
    if(running) return;
    running = true;
    startStop.textContent = "Pause";
    last = performance.now();
    statusEl.textContent = "läuft";
    raf = requestAnimationFrame(loop);
  }

  function stop(update=true) {
    running = false;
    startStop.textContent = "Start";
    if(raf !== null) cancelAnimationFrame(raf);
    raf = null;
    if(update) statusEl.textContent = "pausiert";
  }

  function loop(t) {
    if(!running) return;
    const frame = 1000/Number(fps.value);
    if(t - last >= frame) {
      step();
      last = t;
    }
    raf = requestAnimationFrame(loop);
  }

  function clear() {
    stop(false);
    grid.fill(0);
    generation = 0;
    patternHistory.clear();
    statusEl.textContent = "leer";
    render(0);
  }

  function randomize() {
    stop(false);
    const d = Number(density.value)/100;
    let alive = 0;
    for(let i=0;i<grid.length;i++) {
      const v = Math.random() < d ? ALIVE : DEAD;
      grid[i] = v;
      if(v) alive++;
    }
    generation = 0;
    patternHistory.clear();
    statusEl.textContent = "random";
    render(alive);
  }

  function placePreset(name) {
    stop(false);
    grid.fill(0);
    const p = presets[name];
    const mr = Math.max(...p.map(a => a[0]));
    const mc = Math.max(...p.map(a => a[1]));
    const ox = Math.floor((cols - mc - 1)/2);
    const oy = Math.floor((rows - mr - 1)/2);

    for(const [y,x] of p) {
      const xx = ox + x, yy = oy + y;
      if(xx >= 0 && xx < cols && yy >= 0 && yy < rows)
        grid[idx(xx,yy)] = ALIVE;
    }

    generation = 0;
    patternHistory.clear();
    statusEl.textContent = "preset";
    render();
  }

  function save() {
    const data = {
      grid: Array.from(grid),
      generation,
      cols,
      rows,
      ratio: ratio.value,
      zoomMode: zoomMode.checked,
      zoom: zoom.value,
      torus: torus.checked
    };
    localStorage.setItem('gameOfLifeSave', JSON.stringify(data));
    statusEl.textContent = "Gespeichert!";
    setTimeout(() => {
      if(statusEl.textContent === "Gespeichert!") {
        statusEl.textContent = running ? "läuft" : "pausiert";
      }
    }, 2000);
  }

  function load() {
    const saved = localStorage.getItem('gameOfLifeSave');
    if(!saved) {
      statusEl.textContent = "Keine gespeicherten Daten";
      return;
    }
    try {
      const data = JSON.parse(saved);
      stop(false);
      if(data.cols === cols && data.rows === rows) {
        grid.set(data.grid);
        generation = data.generation || 0;
        ratio.value = data.ratio || "3";
        zoomMode.checked = data.zoomMode || false;
        zoom.value = data.zoom || "1";
        torus.checked = data.torus !== undefined ? data.torus : true;
        patternHistory.clear();
        statusEl.textContent = "Geladen!";
        render();
        setTimeout(() => {
          if(statusEl.textContent === "Geladen!") statusEl.textContent = "bereit";
        }, 2000);
      } else {
        statusEl.textContent = "Grid-Größe stimmt nicht überein";
      }
    } catch(e) {
      statusEl.textContent = "Fehler beim Laden";
    }
  }

  function pointerToCell(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: Math.floor((e.clientX - r.left) * cols / r.width),
      y: Math.floor((e.clientY - r.top) * rows / r.height)
    };
  }

  function paint(e) {
    const p = pointerToCell(e);
    if(p.x < 0 || p.x >= cols || p.y < 0 || p.y >= rows) return;
    grid[idx(p.x, p.y)] = drawMode;
    generation = 0;
    patternHistory.clear();
    render();
    statusEl.textContent = "bearbeitet";
  }

  async function toggleFullscreen() {
    try {
      if(!document.fullscreenElement) {
        await app.requestFullscreen();
        app.classList.add("fullscreen");
        fullscreenBtn.textContent = "Exit Fullscreen";
      } else {
        await document.exitFullscreen();
        app.classList.remove("fullscreen");
        fullscreenBtn.textContent = "Fullscreen";
      }
      setTimeout(resize, 0);
    } catch {
      statusEl.textContent = "Fullscreen nicht verfügbar";
    }
  }

  startStop.onclick = () => running ? stop() : start();
  stepBtn.onclick = () => { stop(false); step(); };
  clearBtn.onclick = clear;
  randomBtn.onclick = randomize;
  placePresetBtn.onclick = () => placePreset(presetSel.value);
  fullscreenBtn.onclick = toggleFullscreen;
  fps.oninput = () => fpsLabel.textContent = fps.value;
  density.oninput = () => densityLabel.textContent = density.value;
  ratio.onchange = () => { statusEl.textContent = "Ratio geändert"; resize(); };
  zoomMode.onchange = () => {
    syncCanvasCss();
    statusEl.textContent = zoomMode.checked ? "Zoom aktiv" : "Zoom aus";
  };
  zoom.oninput = () => {
    syncCanvasCss();
    statusEl.textContent = "Zoom "+zoom.value+"x";
  };
  torus.onchange = () => { patternHistory.clear(); statusEl.textContent = "Rand geändert"; };
  cycleCheck.onchange = () => patternHistory.clear();
  saveBtn.onclick = save;
  loadBtn.onclick = load;

  canvas.addEventListener("pointerdown", e => {
    e.preventDefault();
    const p = pointerToCell(e);
    if(p.x < 0 || p.x >= cols || p.y < 0 || p.y >= rows) return;
    drawMode = grid[idx(p.x, p.y)] ? DEAD : ALIVE;
    paint(e);
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener("pointermove", e => {
    if(drawMode === null) return;
    e.preventDefault();
    paint(e);
  });
  canvas.addEventListener("pointerup", e => {
    drawMode = null;
    if(canvas.hasPointerCapture(e.pointerId))
      canvas.releasePointerCapture(e.pointerId);
  });
  canvas.addEventListener("pointerleave", () => drawMode = null);

  window.addEventListener("resize", resize);
  document.addEventListener("fullscreenchange", () => {
    app.classList.toggle("fullscreen", !!document.fullscreenElement);
    fullscreenBtn.textContent = document.fullscreenElement ? "Exit Fullscreen" : "Fullscreen";
    setTimeout(resize, 0);
  });
  window.addEventListener("keydown", e => {
    if(e.code === "Space") { e.preventDefault(); running ? stop() : start(); }
    else if(e.key.toLowerCase() === "r") randomize();
    else if(e.key.toLowerCase() === "f") toggleFullscreen();
    else if(e.key === "+" || e.key === "=") {
      zoomMode.checked = true;
      zoom.value = Math.min(16, Number(zoom.value)+1);
      syncCanvasCss();
    }
    else if(e.key === "-") {
      zoomMode.checked = true;
      zoom.value = Math.max(1, Number(zoom.value)-1);
      syncCanvasCss();
    }
    else if(e.key.toLowerCase() === "s") save();
    else if(e.key.toLowerCase() === "l") load();
  });

  resize();
  randomize();
})();
</script>
</body>
</html>
