name: Game of Life - Build & Deploy

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GAME_VERSION: '1.0'
  BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}

jobs:
  lint:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: null

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: htmlhint --format compact game_of_life.html || true

  html-validate:
    name: HTML Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: null

      - name: Run html-validate
        run: npx --yes html-validate@latest game_of_life.html || true

  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: null

      - name: Create build artifact
        run: |
          mkdir -p build
          cp game_of_life.html build/index.html
          echo "Build completed at $(date -u)" > build/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> build/BUILD_INFO.txt
          echo "Branch: ${{ github.ref_name }}" >> build/BUILD_INFO.txt
          echo "Version: ${{ env.GAME_VERSION }}" >> build/BUILD_INFO.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-of-life
          path: build/
          retention-days: 30
          if-no-files-found: error

  release:
    name: Auto Release
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: game-of-life
          path: release-artifacts/

      - name: Create release archive
        env:
          RELEASE_TAG: v${{ env.GAME_VERSION }}.${{ github.run_number }}
        run: |
          set -eu
          archive="game-of-life-${RELEASE_TAG}.zip"
          cd release-artifacts
          zip -r "../$archive" .
          printf 'ARCHIVE=%s\n' "../$archive" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        continue-on-error: true
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ env.GAME_VERSION }}.${{ github.run_number }}
        run: |
          set +e
          repo="${{ github.repository }}"
          api="https://api.github.com/repos/$repo"
          auth=(-H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json")

          # 1) already exists?
          curl -s "${auth[@]}" "$api/releases/tags/$RELEASE_TAG" -o /tmp/ex.json
          if grep -q '"id"' /tmp/ex.json; then
            echo "Release $RELEASE_TAG already exists - skipping."
            exit 0
          fi

          # 2) create release
          payload="{\"tag_name\":\"$RELEASE_TAG\",\"target_commitish\":\"main\",\"name\":\"Game of Life $RELEASE_TAG\",\"body\":\"Automated release run #${{ github.run_number }}\"}"
          http=$(curl -s "${auth[@]}" -X POST "$api/releases" -d "$payload" -o /tmp/cr.json -w '%{http_code}')
          body=$(cat /tmp/cr.json)

          echo "CREATE_HTTP=$http"
          echo "CREATE_BODY=$body"

          if [ "$http" != "201" ]; then
            # stable, parseable annotation I can read via the API
            echo "::error::ReleaseCreateFailed HTTP=$http BODY=$(echo "$body" | tr '\n' ' ' | head -c 300)"
            exit 0
          fi

          # 3) upload asset
          rid=$(echo "$body" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          ahttp=$(curl -s "${auth[@]}" -X POST -H "Content-Type: application/zip" \
            --data-binary "@$ARCHIVE" \
            "https://uploads.github.com/repos/$repo/releases/$rid/assets?name=$(basename "$ARCHIVE")" \
            -o /tmp/as.json -w '%{http_code}')
          echo "ASSET_HTTP=$ahttp"
          if [ "$ahttp" != "201" ]; then
            echo "::error::AssetUploadFailed HTTP=$ahttp BODY=$(cat /tmp/as.json | tr '\n' ' ' | head -c 300)"
          fi

  pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: game-of-life
          path: .

      - name: Upload and deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
