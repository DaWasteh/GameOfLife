name: Game of Life - Build & Deploy

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GAME_VERSION: '1.0'
  BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}

jobs:
  lint:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: null

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: htmlhint --format compact game_of_life.html || true

  html-validate:
    name: HTML Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: null

      - name: Run html-validate
        run: npx --yes html-validate@latest game_of_life.html || true

  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: null

      - name: Create build artifact
        run: |
          mkdir -p build
          cp game_of_life.html build/index.html
          echo "Build completed at $(date -u)" > build/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> build/BUILD_INFO.txt
          echo "Branch: ${{ github.ref_name }}" >> build/BUILD_INFO.txt
          echo "Version: ${{ env.GAME_VERSION }}" >> build/BUILD_INFO.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-of-life
          path: build/
          retention-days: 30
          if-no-files-found: error

  release:
    name: Auto Release
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: game-of-life
          path: release-artifacts/

      - name: Create release archive
        env:
          RELEASE_TAG: v${{ env.GAME_VERSION }}.${{ github.run_number }}
        run: |
          set -eu
          archive="game-of-life-${RELEASE_TAG}.zip"
          cd release-artifacts
          zip -r "../$archive" .
          printf 'ARCHIVE=%s\n' "../$archive" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ env.GAME_VERSION }}.${{ github.run_number }}
        run: |
          set -eu
          echo "Tag: $RELEASE_TAG | Repo: ${{ github.repository }}"
          ls -la "$ARCHIVE"
          # Check if release already exists (API call, tolerate 404)
          existing=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG" \
            || echo '{}')
          if echo "$existing" | grep -q '"id"'; then
            echo "Release $RELEASE_TAG already exists – skipping."
            exit 0
          fi
          # Create release via REST API (deterministic, returns clear JSON errors)
          resp=$(curl -fsSL -w '\n%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$RELEASE_TAG\",\"target_commitish\":\"${{ github.event.repository.default_branch }}\",\"name\":\"Game of Life $RELEASE_TAG\",\"body\":\"Automated release from commit ${{ github.sha }} (run #${{ github.run_number }}).\",\"draft\":false,\"prerelease\":false}")
          http_code=$(echo "$resp" | tail -1)
          body=$(echo "$resp" | sed '$d')
          echo "HTTP $http_code"
          echo "$body"
          if [ "$http_code" != "201" ]; then
            echo "::error::Release creation failed (HTTP $http_code)"; exit 1
          fi
          release_id=$(echo "$body" | python -c "import sys,json;print(json.load(sys.stdin)['id'])")
          # Upload asset
          upload_url="https://uploads.github.com/repos/${{ github.repository }}/releases/$release_id/assets?name=$(basename "$ARCHIVE")"
          aresp=$(curl -fsSL -w '\n%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/zip" \
            --data-binary "@$ARCHIVE" \
            "$upload_url" || true)
          echo "asset upload: $aresp"

  pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: game-of-life
          path: .

      - name: Upload and deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
